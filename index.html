ata-v-68cd6b44 data-v-eb709286><div class="vp-home" data-v-eb709286 data-v-f0fac391><!--[--><div class="" data-v-f0fac391><div class="vp-blog home-blog" vp-blog data-v-f0fac391 data-v-bb5de8a7><!--[--><!--]--><div class="blog-container" data-v-bb5de8a7><!----><div class="vp-blog-post-list" data-v-bb5de8a7 data-v-e81809e0><!--[--><!--]--><!--[--><template><div class="vp-blog-post-item" data-allow-mismatch data-v-e81809e0 data-v-ef4869a2><!----><div class="blog-post-item-content" data-v-ef4869a2><h3 data-v-ef4869a2><!----><!----><a class="vp-link no-icon link" href="/article/git-tags-and-naming-conventions/" data-v-ef4869a2 data-v-442a52aa><!--[-->Git 标记和命名习惯<!--]--><!----></a></h3><div class="post-meta" data-v-ef4869a2><div class="category-list" data-v-ef4869a2><span class="icon vpi-folder" data-v-ef4869a2></span><!--[--><!--[--><a class="vp-link no-icon link" href="/categories/?id=41282b" data-v-ef4869a2 data-v-442a52aa><!--[-->编程<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-ef4869a2><span class="icon vpi-tag" data-v-ef4869a2></span><!--[--><a class="vp-link no-icon link tag vp-tag-ao9j" href="/tags/?tag=Git" data-v-ef4869a2 data-v-442a52aa><!--[-->Git<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-mqbi" href="/tags/?tag=GitHub" data-v-ef4869a2 data-v-442a52aa><!--[-->GitHub<!--]--><!----></a><!--]--></div><div class="create-time" data-v-ef4869a2><span class="icon vpi-clock" data-v-ef4869a2></span><span data-v-ef4869a2>2025-04-07</span></div></div><div class="vp-doc excerpt" data-v-ef4869a2>写在前面在逛 GitHub 的时候，发现很多人的 GitHub 提交说明格式很统一，后面也无意间刷到了一些人汇总的 Git 标记和命名习惯，感觉挺有用，这里记录下来。当然每个公司内部应该会有自己形成的一套规则，在工作的时候还是要遵守公司内部的规范。提交信息标记在使用 Git 进行版本控制的时候...</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-e81809e0 data-v-ef4869a2><!----><div class="blog-post-item-content" data-v-ef4869a2><h3 data-v-ef4869a2><!----><!----><a class="vp-link no-icon link" href="/article/automatically-publish-vscode-plugins-using-github-action/" data-v-ef4869a2 data-v-442a52aa><!--[-->使用 GitHub Action 自动发布 VS Code 插件<!--]--><!----></a></h3><div class="post-meta" data-v-ef4869a2><div class="category-list" data-v-ef4869a2><span class="icon vpi-folder" data-v-ef4869a2></span><!--[--><!--[--><a class="vp-link no-icon link" href="/categories/?id=41282b" data-v-ef4869a2 data-v-442a52aa><!--[-->编程<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-ef4869a2><span class="icon vpi-tag" data-v-ef4869a2></span><!--[--><a class="vp-link no-icon link tag vp-tag-mqbi" href="/tags/?tag=GitHub" data-v-ef4869a2 data-v-442a52aa><!--[-->GitHub<!--]--><!----></a><!--]--></div><div class="create-time" data-v-ef4869a2><span class="icon vpi-clock" data-v-ef4869a2></span><span data-v-ef4869a2>2025-01-07</span></div></div><div class="vp-doc excerpt" data-v-ef4869a2>写在前面为了满足自己的使用需求，这段时间抽空开发了一个 VS Code 插件，开发完成后准备打包发布。看了一下发布方式，觉得使用 vsce 命令行工具发布 VS Code 插件步骤比较繁琐，还是借助 GitHub Action 自动发布更优雅，整体过程和自动发布 npm 包基本相同，感兴趣的可...</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-e81809e0 data-v-ef4869a2><!----><div class="blog-post-item-content" data-v-ef4869a2><h3 data-v-ef4869a2><!----><!----><a class="vp-link no-icon link" href="/article/vscode-visualizes-c-call-chain-plugin-c-relation/" data-v-ef4869a2 data-v-442a52aa><!--[-->VS Code 可视化查看 C 调用链插件 C Relation<!--]--><!----></a></h3><div class="post-meta" data-v-ef4869a2><div class="category-list" data-v-ef4869a2><span class="icon vpi-folder" data-v-ef4869a2></span><!--[--><!--[--><a class="vp-link no-icon link" href="/categories/?id=c31f48" data-v-ef4869a2 data-v-442a52aa><!--[-->分享<!--]--><!----></a><span data-v-ef4869a2>/</span><!--]--><!--[--><a class="vp-link no-icon link" href="/categories/?id=ceea11" data-v-ef4869a2 data-v-442a52aa><!--[-->工具<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-ef4869a2><span class="icon vpi-clock" data-v-ef4869a2></span><span data-v-ef4869a2>2024-12-20</span></div></div><div class="vp-doc excerpt" data-v-ef4869a2>简介一直想用 SourceInsight 一样的可以查看函数调用链一样的功能，但是又不想用 SourceInsight，找了一圈没有找到 VS Code 有类似功能的插件，索性自己开发了一个。这是一个可以可视化显示 C 函数调用关系的 VS Code 插件，功能纯粹，使用简单。项目依赖Tree...</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-e81809e0 data-v-ef4869a2><!----><div class="blog-post-item-content" data-v-ef4869a2><h3 data-v-ef4869a2><!----><!----><a class="vp-link no-icon link" href="/article/everything-goes-well/" data-v-ef4869a2 data-v-442a52aa><!--[-->柿柿如意<!--]--><!----></a></h3><div class="post-meta" data-v-ef4869a2><div class="category-list" data-v-ef4869a2><span class="icon vpi-folder" data-v-ef4869a2></span><!--[--><!--[--><a class="vp-link no-icon link" href="/categories/?id=8936f5" data-v-ef4869a2 data-v-442a52aa><!--[-->随笔<!--]--><!----></a><span data-v-ef4869a2>/</span><!--]--><!--[--><a class="vp-link no-icon link" href="/categories/?id=bd5b91" data-v-ef4869a2 data-v-442a52aa><!--[-->拾遗<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-ef4869a2><span class="icon vpi-clock" data-v-ef4869a2></span><span data-v-ef4869a2>2024-12-03</span></div></div><div class="vp-doc excerpt" data-v-ef4869a2>这两天央视公布了乙巳年春晚的图标和吉祥物图案，图标是一个“乙巳”的艺术体，重复组合可以形成各式图案，像是吉祥如意纹。吉祥物则是一只可爱的小蛇——巳升升，憨态可掬。2024 甲辰年已经接近尾声，仿佛工作了，时间过的更快，好像前几天才登上反杭的车，这马上又可以回家过年了。不知怎的，想写点东西回味一...</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-e81809e0 data-v-ef4869a2><!----><div class="blog-post-item-content" data-v-ef4869a2><h3 data-v-ef4869a2><!----><!----><a class="vp-link no-icon link" href="/article/yuque-exporter-a-document-bulk-export-tool/" data-v-ef4869a2 data-v-442a52aa><!--[-->语雀文档批量导出工具 YuqueExporter<!--]--><!----></a></h3><div class="post-meta" data-v-ef4869a2><div class="category-list" data-v-ef4869a2><span class="icon vpi-folder" data-v-ef4869a2></span><!--[--><!--[--><a class="vp-link no-icon link" href="/cat
